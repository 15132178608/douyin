name: Windows Installer

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - ".github/workflows/windows-installer.yml"
      - "packaging/windows/**"
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "CHANGELOG.md"
      - "README.md"
      - ".env.example"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: .\packaging\windows\build-installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: DouyinRecallSetup
          path: packaging/windows/out/DouyinRecallSetup.exe
          if-no-files-found: error

  publish-draft-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download installer artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: DouyinRecallSetup
          path: packaging/windows/out

      - name: Create Draft GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notesPath = "docs/releases/${env:GITHUB_REF_NAME}.md"
          $releaseArgs = @(
            "release", "create", "${env:GITHUB_REF_NAME}",
            "packaging/windows/out/DouyinRecallSetup.exe",
            "--title", "${env:GITHUB_REF_NAME}",
            "--draft"
          )
          if (Test-Path $notesPath) {
            $releaseArgs += @("--notes-file", $notesPath)
          }
          else {
            $releaseArgs += @("--notes", "Windows installer for Douyin Recall ${env:GITHUB_REF_NAME}.")
          }
          & gh @releaseArgs
