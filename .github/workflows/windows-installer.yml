name: Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - ".github/workflows/windows-installer.yml"
      - "packaging/windows/**"
      - "src/**"
      - "scripts/**"
      - "docs/**"
      - "CHANGELOG.md"
      - "README.md"
      - ".env.example"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: .\packaging\windows\build-installer.ps1

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DouyinRecallSetup
          path: packaging/windows/out/DouyinRecallSetup.exe
          if-no-files-found: error

      - name: Create Draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notesPath = "docs/releases/${env:GITHUB_REF_NAME}.md"
          $releaseArgs = @(
            "release", "create", "${env:GITHUB_REF_NAME}",
            "packaging/windows/out/DouyinRecallSetup.exe",
            "--title", "${env:GITHUB_REF_NAME}",
            "--draft"
          )
          if (Test-Path $notesPath) {
            $releaseArgs += @("--notes-file", $notesPath)
          }
          else {
            $releaseArgs += @("--notes", "Windows installer for Douyin Recall ${env:GITHUB_REF_NAME}.")
          }
          & gh @releaseArgs
