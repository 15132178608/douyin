<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>抖音回忆 · 登录</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #090a0f;
      color: #f4f5f7;
    }
    .login-panel {
      width: min(360px, calc(100vw - 32px));
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: #15161f;
    }
    h1 { margin: 0 0 22px; font-size: 24px; }
    label { display: block; margin: 0 0 14px; color: #a9adba; font-size: 13px; }
    label span { display: block; margin-bottom: 7px; }
    input {
      box-sizing: border-box;
      width: 100%;
      height: 42px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.14);
      background: #0f1017;
      color: #f4f5f7;
      padding: 0 12px;
      font-size: 15px;
    }
    button {
      width: 100%;
      height: 42px;
      margin-top: 6px;
      border: 0;
      border-radius: 6px;
      color: #071014;
      background: #25f4ee;
      font-weight: 700;
      cursor: pointer;
    }
    .form-error {
      margin: 2px 0 12px;
      color: #ff6b86;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <section class="login-panel">
    <h1>抖音回忆</h1>
    <form method="post" action="/login">
      <input type="hidden" name="next" value="{{ next or '/' }}">
      <label>
        <span>邀请码</span>
        <input name="invite_code" autocomplete="one-time-code" required>
      </label>
      <label>
        <span>名字</span>
        <input name="display_name" autocomplete="name" placeholder="给自己起个名字">
      </label>
      {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
      <button type="submit">进入</button>
    </form>
  </section>
</body>
</html>
